name: Scrape & Alert

on:
  schedule:
    # Run every 12 hours (UTC)
    - cron: "0 6,18 * * *"
  workflow_dispatch:   # also allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Need write access to commit the updated DB and RSS feed
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Restore DB from cache
        uses: actions/cache@v4
        with:
          path: watchdog.db
          key: watchdog-db-${{ github.run_id }}
          restore-keys: watchdog-db-

      - name: Run scrapers
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BLUESKY_HANDLE:      ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          SITE_LINK:           "https://${{ github.repository_owner }}.github.io/tx-surveillance-watch"
        run: python main.py

      - name: Commit RSS feed & DB
        run: |
          git config user.name  "TxSurveillanceWatch Bot"
          git config user.email "bot@txsurveillancewatch"
          git add public/feed.xml watchdog.db
          git diff --cached --quiet || git commit -m "chore: scrape run $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
