name: Scrape & Alert

on:
  schedule:
    - cron: "0 6,18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Restore DB from cache
        uses: actions/cache@v4
        with:
          path: watchdog.db
          key: watchdog-db-${{ github.run_id }}
          restore-keys: watchdog-db-

      - name: Run scrapers
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BLUESKY_HANDLE:      ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          SITE_LINK: "https://stickyhashtr33.github.io/tx-surveillance-watch"
        run: python main.py

      - name: Commit RSS feed & DB
        run: |
          git config user.name  "TxSurveillanceWatch Bot"
          git config user.email "bot@txsurveillancewatch.github.io"
          mkdir -p public
          git add -f public/feed.xml || true
          git add -f watchdog.db || true
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "chore: scrape run $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push origin main || echo "Push failed but continuing"